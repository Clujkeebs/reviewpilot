<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ReviewPilot</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="signup.css" />
</head>
<body>

  <div class="signup-page">

    <!-- Left: form -->
    <div class="signup-form-col">
      <a href="/login" class="signup-back">← Back to login</a>

      <div class="signup-form-wrap">
        <div class="signup-logo">
          <span>📍</span>
          <span class="signup-logo-text">
            <span class="signup-logo-name">ReviewPilot</span>
            <a href="https://clujkeebs.com" target="_blank" class="signup-logo-by">by Clujkeebs</a>
          </span>
        </div>

        <h1 class="signup-h1">Reset your password.</h1>
        <p class="signup-sub">Choose a new password to get back into your account.</p>

        <form id="reset-form" novalidate>

          <div class="sf-field">
            <label class="sf-lbl" for="r-pw">New Password <span style="font-size:11px;color:#6b7280">(min. 8 characters)</span></label>
            <input class="sf-inp" type="password" id="r-pw" placeholder="Choose a strong new password" required minlength="8" />
          </div>

          <div class="sf-field">
            <label class="sf-lbl" for="r-pw2">Confirm New Password</label>
            <input class="sf-inp" type="password" id="r-pw2" placeholder="Re-enter your new password" required minlength="8" />
          </div>

          <div id="rf-error" class="sf-error hidden"></div>

          <button class="sf-submit" type="submit" id="rf-btn">
            <span id="rf-btn-txt">Reset Password →</span>
            <span class="sf-spinner hidden" id="rf-spinner"></span>
          </button>

          <p class="sf-terms" style="margin-top:14px;font-size:13px;color:#6b7280">
            Remembered your password? <a href="/login" style="color:#1d4ed8;font-weight:600">Log in</a>
          </p>
        </form>
      </div>
    </div>

    <!-- Right: proof col -->
    <div class="signup-proof-col">
      <div class="proof-inner">
        <div class="proof-headline">Back to dominating Google Maps in 30 seconds.</div>
        <div class="proof-checks">
          <div class="proof-check">✓ Your customer list is safe</div>
          <div class="proof-check">✓ Your AI replies are ready</div>
          <div class="proof-check">✓ Your GBP audit history is intact</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const form     = document.getElementById('reset-form');
    const btn      = document.getElementById('rf-btn');
    const btnTxt   = document.getElementById('rf-btn-txt');
    const spinner  = document.getElementById('rf-spinner');
    const errorBox = document.getElementById('rf-error');

    if (!token) {
      showError('Missing reset token. Please use the link from your email.');
      btn.disabled = true;
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      const pw  = document.getElementById('r-pw').value;
      const pw2 = document.getElementById('r-pw2').value;
      if (pw.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (pw !== pw2)    { showError('Passwords do not match.'); return; }
      setBusy(true);
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: pw }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Unable to reset password.'); return; }
        btnTxt.textContent = '✓ Password reset! Redirecting…';
        setTimeout(() => { window.location.href = data.redirect || '/login'; }, 1200);
      } catch {
        showError('Network error. Please try again.');
      } finally {
        setBusy(false);
      }
    });

    function setBusy(busy) {
      btn.disabled = busy;
      btnTxt.textContent = busy ? 'Resetting…' : 'Reset Password →';
      spinner.classList.toggle('hidden', !busy);
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }
  </script>
</body>
</html>
